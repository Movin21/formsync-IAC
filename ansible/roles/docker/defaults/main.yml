---
docker_apt_release_channel: stable
docker_apt_arch: amd64
docker_apt_repository_url: https://download.docker.com/linux/ubuntu
docker_apt_gpg_key_url: https://download.docker.com/linux/ubuntu/gpg
docker_apt_gpg_key_path: /etc/apt/keyrings/docker.asc
docker_apt_repo_path: /etc/apt/sources.list.d/docker.list

docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

docker_service_state: started
docker_service_enabled: true

docker_users: []

docker_compose_project_name: app
docker_compose_dir: /opt/app
docker_compose_create_sample: true

docker_daemon_options: {}
